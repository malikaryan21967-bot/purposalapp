<!DOCTYPE html>
<html lang="en">
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine?</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffe3e3 0%, #fca5a5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* Container & Layout */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
            z-index: 10;
            transition: all 0.5s ease;
        }

        /* Animations */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* Elements */
        .bear {
            font-size: 80px;
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #db2777;
            font-size: 3rem;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .subtitle {
            font-style: italic;
            color: #4b5563;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .footer-text {
            font-size: 0.85rem;
            color: #9ca3af;
            margin-top: 30px;
        }

        /* Buttons */
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-top: 20px;
            min-height: 60px;
        }

        .btn {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        #yesBtn {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            padding: 15px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        #yesBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.7);
        }

        #noBtn {
            background: white;
            color: #dc2626;
            border: 2px solid #dc2626;
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 50px;
            z-index: 100;
        }

        /* Celebration State */
        .hidden {
            display: none !important;
        }

        .celebration-title {
            font-size: 4rem;
            color: #e11d48;
            animation: pulse 1.5s infinite ease-in-out;
            margin-bottom: 10px;
        }

        .spinning-emoji {
            font-size: 80px;
            display: inline-block;
            animation: spin 3s infinite linear;
            margin: 20px 0;
        }

        .celebration-msg {
            font-size: 1.4rem;
            color: #4c0519;
            font-weight: 600;
        }

        /* Floating Objects Background wrappers */
        .heart {
            position: absolute;
            bottom: -50px;
            pointer-events: none;
            z-index: 1;
            animation: floatUp linear infinite;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 5;
            animation: confettiFall linear forwards;
        }
    </style>
</head>
<body>

    <!-- Floating Hearts Background Container -->
    <div id="heartContainer"></div>

    <!-- Main Card -->
    <div class="card" id="mainCard">
        <div id="questionArea">
            <div class="bear">🐻</div>
            <h1>Will You Be My Valentine, Noori?</h1>
            <p class="subtitle">I've been gathering courage to ask you this...</p>
            
            <div class="btn-container">
                <button class="btn" id="yesBtn">Yes</button>
                <button class="btn" id="noBtn">No</button>
            </div>

            <p class="footer-text">Every love story is beautiful, but ours is my favourite</p>
        </div>

        <!-- Celebration Area (Initially Hidden) -->
        <div id="celebrationArea" class="hidden">
            <h1 class="celebration-title">Yayyyy!!</h1>
            <div class="spinning-emoji">💖</div>
            <p class="celebration-msg">I knew you'd say yes...</p>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const heartContainer = document.getElementById('heartContainer');
        const questionArea = document.getElementById('questionArea');
        const celebrationArea = document.getElementById('celebrationArea');

        const cheekyMessages = [
            "Nope, not an option!", 
            "Try again!", 
            "You sure about that?", 
            "Not happening!", 
            "Think again!"
        ];
        let msgIndex = 0;

        // 1. Generate Floating Hearts
        const totalHearts = 15;
        for (let i = 0; i < totalHearts; i++) {
            createHeart();
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            
            // Randomize properties
            const size = Math.random() * 20 + 15; // 15px to 35px
            const left = Math.random() * 100; // 0% to 100% width
            const duration = Math.random() * 5 + 4; // 4s to 9s flight time
            const delay = Math.random() * 5; // offset start times

            heart.style.fontSize = `${size}px`;
            heart.style.left = `${left}%`;
            heart.style.animationDuration = `${duration}s`;
            heart.style.animationDelay = `-${delay}s`; // negative delay triggers immediately spread out

            heartContainer.appendChild(heart);
        }

        // 2. Run Away No Button logic
        function moveNoButton(e) {
            // Prevent default touch actions on mobile to stop bouncing/scrolling
            if (e.type === 'touchstart') e.preventDefault();

            const yesRect = yesBtn.getBoundingClientRect();
            const padding = 100; // Keep clear radius away from Yes button

            let randomX, randomY;
            let overlaps = true;

            // Loop until we find a spot safe from the Yes button
            while (overlaps) {
                randomX = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40) + 20;
                randomY = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40) + 20;

                // Check collision with Yes button bounding box + padding
                const xOverlap = randomX < yesRect.right + padding && randomX + noBtn.offsetWidth > yesRect.left - padding;
                const yOverlap = randomY < yesRect.bottom + padding && randomY + noBtn.offsetHeight > yesRect.top - padding;

                if (!xOverlap || !yOverlap) {
                    overlaps = false;
                }
            }

            // Reposition button
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;

            // Update text cycle
            noBtn.innerText = cheekyMessages[msgIndex];
            msgIndex = (msgIndex + 1) % cheekyMessages.length;
        }

        // Register both desktop hover and mobile click/touch entries
        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('click', moveNoButton);
        noBtn.addEventListener('touchstart', moveNoButton);

        // 3. Yes Button Click Celebration
        yesBtn.addEventListener('click', () => {
            // Hide layouts
            questionArea.classList.add('hidden');
            celebrationArea.classList.remove('hidden');

            // Clear floating hearts background
            heartContainer.innerHTML = '';

            // Explode confetti
            createConfetti(120);
        });

        function createConfetti(amount) {
            const colors = ['#ff477e', '#ff7096', '#ff85a1', '#fbb1bd', '#f9bec7', '#f72585', '#b5179e', '#7209b7'];
            
            for (let i = 0; i < amount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Random shapes / attributes
                const left = Math.random() * 100;
                const duration = Math.random() * 3 + 2; // 2s to 5s falling speed
                const delay = Math.random() * 1.5;
                const size = Math.random() * 6 + 6; // 6px to 12px
                const color = colors[Math.floor(Math.random() * colors.length)];

                confetti.style.left = `${left}%`;
                confetti.style.width = `${size}px`;
                confetti.style.height = `${size}px`;
                confetti.style.backgroundColor = color;
                confetti.style.animationDuration = `${duration}s`;
                confetti.style.animationDelay = `${delay}s`;
                
                // Mix up squares vs circles
                if (Math.random() > 0.5) {
                    confetti.style.borderRadius = '50%';
                }

                document.body.appendChild(confetti);

                // Clean up DOM node after fall cycle completes
                setTimeout(() => {
                    confetti.remove();
                }, (duration + delay) * 1000);
            }
        }
    </script>
</body>
</html>
